name: Sync NovaEngel → Shopify

on:
  schedule:
    - cron: '*/15 * * * *'   # toutes les 15 minutes (fiable)
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  sync:
    runs-on: ubuntu-latest

    concurrency:
      group: shopify-sync
      cancel-in-progress: false

    timeout-minutes: 360

    env:
      SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
      SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
      NOVA_USER: ${{ secrets.NOVA_USER }}
      NOVA_PASS: ${{ secrets.NOVA_PASS }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run sync
        run: python sync.py
